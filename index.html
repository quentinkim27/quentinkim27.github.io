<head>

<link rel="stylesheet" href="src/css/style.css">
</head>
<body data-page="home">
<nav class="navbar" role="navigation" aria-label="Main navigation">
  <div class="nav-container">
    <a href="index.html" class="nav-logo" aria-label="Home">
      <span id="nav-logo-main" class="brand-first">Cheng</span><span id="nav-logo-suffix" class="brand-last">Kun</span>
    </a>
    <ul class="nav-links" id="nav-links"></ul>
    <div class="nav-controls">
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="en" type="button">EN</button>
        <button class="lang-btn" data-lang="zh" type="button">ZH</button>
      </div>
      <button class="btn-icon" title="Toggle theme" id="theme-btn" type="button">☀</button>
    </div>
  </div>
</nav>

<aside class="side-nav" id="side-nav" aria-label="Home page sections"></aside>

<main class="about-main">
  <section id="hero">
    <div class="hero-content">
      <div class="hero-text">
        <div class="hero-tag" id="hero-tag"></div>
        <h1 class="hero-name" id="hero-name"></h1>
        <div class="hero-typing"><span id="typing-text"></span><span class="cursor"></span></div>
        <p class="hero-desc" id="hero-desc"></p>
        <div class="hero-actions">
          <a class="btn-primary btn-cv" id="btn-cv" href="#" download></a>
          <a class="profile-icon-link" id="btn-orcid" href="#" target="_blank" rel="noopener noreferrer" aria-label="ORCID"></a>
          <a class="profile-icon-link" id="btn-researchgate" href="#" target="_blank" rel="noopener noreferrer" aria-label="ResearchGate"></a>
          <a class="profile-icon-link" id="btn-googlescholar" href="#" target="_blank" rel="noopener noreferrer" aria-label="Google Scholar"></a>
        </div>
      </div>
      <div class="hero-avatar">
        <div class="avatar-wrap">
          <div id="avatar-slot"></div>
        </div>
      </div>
    </div>
    <div class="hero-scroll">
      <div class="scroll-line"></div>
      <span id="scroll-hint"></span>
    </div>
  </section>

  <section id="news" class="about-band band-news">
    <div class="section-label" id="section-news-label"></div>
    <h2 class="section-title reveal" id="section-news-title"></h2>
    <div class="news-list" id="news-list"></div>
  </section>

  <section id="selected-publications" class="about-band band-projects">
    <div class="section-label" id="section-selected-label"></div>
    <div class="section-heading-row reveal">
      <h2 class="section-title" id="section-selected-title"></h2>
      <a class="section-more-link" href="publications.html">View All</a>
    </div>
    <div class="projects-grid" id="selected-publications-grid"></div>
  </section>

  <section id="projects" class="about-band band-news">
    <div class="section-label" id="section-projects-label"></div>
    <div class="section-heading-row reveal">
      <h2 class="section-title" id="section-projects-title"></h2>
      <a class="section-more-link" href="projects.html">View All</a>
    </div>
    <div class="projects-grid" id="projects-grid"></div>
  </section>

  <section id="research" class="about-band band-research">
    <div class="section-label" id="section-research-label"></div>
    <h2 class="section-title reveal" id="section-research-title"></h2>
    <div class="research-grid" id="research-grid"></div>
  </section>
</main>

<footer id="footer"></footer>

<script src="src/js/config.js"></script>
<script src="src/js/script.js"></script>
</body>
</html>
