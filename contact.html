<!DOCTYPE html>
<html lang="en" data-theme="light" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>
<meta name="description" content="Academic homepage contact." />
<meta property="og:title" content="Contact" />
<meta property="og:description" content="Academic homepage contact." />
<meta property="og:url" content="" />
<meta property="og:type" content="website" />
<meta property="og:image" content="assets/avatar.png" />
<meta name="twitter:title" content="Contact" />
<meta name="twitter:description" content="Academic homepage contact." />
<meta name="twitter:image" content="assets/avatar.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/css/style.css">
</head>
<body data-page="contact">
<nav class="navbar" role="navigation" aria-label="Main navigation">
  <div class="nav-container">
    <a href="index.html" class="nav-logo" aria-label="Home">
      <span id="nav-logo-main" class="brand-first">Cheng</span><span id="nav-logo-suffix" class="brand-last">Kun</span>
    </a>
    <ul class="nav-links" id="nav-links"></ul>
    <div class="nav-controls">
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="en" type="button">EN</button>
        <button class="lang-btn" data-lang="zh" type="button">ZH</button>
      </div>
      <button class="btn-icon" title="Toggle theme" id="theme-btn" type="button">☀</button>
    </div>
  </div>
</nav>

<main class="page-main">
  <section id="contact">
    <div class="section-label" id="section-contact-label"></div>
    <h2 class="section-title reveal" id="section-contact-title"></h2>
    <div class="contact-wrap">
      <div class="contact-info reveal">
        <p id="contact-desc"></p>
        <div class="contact-links" id="contact-links"></div>
      </div>
      <div class="contact-form reveal">
        <div class="form-group">
          <label class="form-label" id="form-name-label" for="f-name"></label>
          <input class="form-input" type="text" placeholder="Your name" id="f-name">
        </div>
        <div class="form-group">
          <label class="form-label" id="form-email-label" for="f-email"></label>
          <input class="form-input" type="email" placeholder="sender@example.com" id="f-email">
        </div>
        <div class="form-group">
          <label class="form-label" id="form-msg-label" for="f-msg"></label>
          <textarea class="form-textarea" placeholder="Hello, I'd like to connect..." id="f-msg"></textarea>
        </div>
        <button class="form-submit" onclick="sendMsg()" id="form-send" type="button"></button>
      </div>
    </div>
  </section>
</main>

<footer id="footer"></footer>
<script src="src/js/config.js"></script>
<script src="src/js/script.js"></script>
</body>
</html>
